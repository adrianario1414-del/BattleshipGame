<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Морской бой</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>⚓ Морской бой</h1>

    <div class="boards">

        <div>
            <h2>Твои корабли</h2>
            <div class="board" id="playerBoard"></div>
        </div>

        <div>
            <h2>Противник</h2>
            <div class="board" id="enemyBoard"></div>
        </div>

    </div>

    <p id="status">Ожидание игры...</p>
<button id="restartBtn">Новая игра</button>

<p>Попаданий: <span id="hits">0</span></p>
   <p>Осталось кораблей противника: <span id="shipsLeft">15</span></p>
    <script src="game.js"></script>

</body>
</html>
